---
- hosts: all
  become: true
  tasks:
    - name: Repair interrupted dpkg process on Ubuntu systems
      command: dpkg --configure -a
      args:
        warn: false
      ignore_errors: yes
      when: ansible_distribution == "Ubuntu"

    - name: update repository index
      apt:
        update_cache: yes
      when: ansible_distribution == "Ubuntu"

    - name: install apache2 package
      apt:
        name: apache2
        state: latest
      when: ansible_distribution == "Ubuntu"
    
    # ... rest of your tasks remain the same
